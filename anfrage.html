<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Anfrage · DÜRERs Café & Bistro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
    :root {
        --ink:#1a1208;--ink-80:rgba(26,18,8,0.8);--ink-60:rgba(26,18,8,0.6);--ink-40:rgba(26,18,8,0.4);
        --cream:#faf6ef;--parch:#f0e8d8;--parch-d:#e4d8c4;
        --rust:#8b3a2a;--rust-l:#b84e38;--gold:#c49a2a;--gold-l:#e8c060;--sage:#4a5c46;
        --shadow-sm:0 2px 8px rgba(26,18,8,0.10);--r-sm:6px;--r:12px;font-size:16px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:'DM Sans',sans-serif;font-weight:300;background:var(--cream);color:var(--ink);line-height:1.7;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.5;}

    header{position:sticky;top:0;z-index:200;background:var(--ink);height:66px;display:flex;align-items:center;padding:0 5%;border-bottom:2px solid var(--gold);justify-content:space-between;}
    .header-left{display:flex;align-items:center;gap:20px;flex:1;}
    .header-brand{display:flex;align-items:center;gap:12px;text-decoration:none;}
    .school-logo{height:40px;width:40px;object-fit:contain;background:white;border-radius:4px;padding:2px;}
    .logo{font-family:'Playfair Display',serif;font-size:1.65rem;font-weight:900;color:var(--cream);text-decoration:none;flex-shrink:0;}
    .logo span{color:var(--gold);}
    nav{display:flex;align-items:center;margin-left:10px;overflow-x:auto;scrollbar-width:none;}
    nav::-webkit-scrollbar{display:none;}
    nav a{display:flex;align-items:center;height:66px;padding:0 14px;font-size:0.8rem;font-weight:500;letter-spacing:0.09em;text-transform:uppercase;color:rgba(250,246,239,0.65);text-decoration:none;border-bottom:3px solid transparent;white-space:nowrap;transition:color 0.2s,border-color 0.2s;}
    nav a:hover,nav a.active{color:var(--gold-l);border-bottom-color:var(--gold);}
    .header-right{display:flex;align-items:center;gap:15px;}
    .social-icon{color:rgba(250,246,239,0.65);display:flex;align-items:center;transition:color 0.2s,transform 0.2s;}
    .social-icon:hover{color:var(--gold-l);transform:translateY(-2px);}
    .hamburger{display:none;flex-direction:column;justify-content:center;gap:6px;cursor:pointer;padding:5px;background:none;border:none;z-index:300;}
    .hamburger span{display:block;width:24px;height:2px;background:var(--cream);border-radius:2px;transition:transform 0.3s,opacity 0.3s;}
    .hamburger.open span:nth-child(1){transform:translateY(8px) rotate(45deg);}
    .hamburger.open span:nth-child(2){opacity:0;}
    .hamburger.open span:nth-child(3){transform:translateY(-8px) rotate(-45deg);}
    .mobile-nav{display:none;position:fixed;top:66px;left:0;right:0;bottom:0;background:var(--ink);z-index:199;flex-direction:column;align-items:center;padding-top:4rem;overflow-y:auto;}
    .mobile-nav.open{display:flex;}
    .mobile-nav a{position:relative;font-size:1.05rem;font-weight:400;color:rgba(250,246,239,0.75);text-decoration:none;padding:1.5rem 0;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.2s;text-align:center;width:100%;max-width:250px;}
    .mobile-nav a:not(:last-child)::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:140px;height:1px;background:rgba(196,154,42,0.25);}
    .mobile-nav a:hover,.mobile-nav a.active{color:var(--gold);}

    .form-wrap{max-width:700px;margin:4rem auto 5rem;padding:0 5%;position:relative;z-index:1;}
    .section-eyebrow{font-family:'DM Mono',monospace;font-size:clamp(1.2rem, 2.5vw, 1.8rem);letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);margin-bottom:0.35rem;display:flex;align-items:center;gap:15px;}
    .section-eyebrow::after{content:'';display:inline-block;height:2px;width:60px;background:var(--gold);opacity:0.5;}
    .section-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,2.5rem);font-weight:700;color:var(--ink);line-height:1.1;margin-bottom:0.5rem;}
    .subtitle{color:var(--ink-80);margin-bottom:2.5rem;font-size:1.1rem;}

    /* Form */
    .anfrage-form{background:white;padding:3rem;border-radius:var(--r);box-shadow:var(--shadow-sm);border-top:4px solid var(--rust);}
    .form-group{margin-bottom:1.5rem;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
    label{display:block;font-weight:500;font-size:0.9rem;margin-bottom:0.5rem;color:var(--ink);}
    input,select,textarea{width:100%;padding:12px 16px;border:1px solid var(--parch-d);border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:1rem;background:var(--cream);transition:border-color 0.2s;color:var(--ink);}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--rust);background:white;}
    textarea{resize:vertical;min-height:120px;}
    .btn{display:inline-flex;justify-content:center;align-items:center;gap:8px;padding:14px 30px;border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;text-decoration:none;transition:all 0.2s;border:none;cursor:pointer;width:100%;margin-top:1rem;}
    .btn-primary{background:var(--rust);color:white;box-shadow:0 4px 14px rgba(139,58,42,0.3);}
    .btn-primary:hover:not(:disabled){background:var(--rust-l);transform:translateY(-2px);}
    .btn-primary:disabled{background:var(--ink-40);box-shadow:none;cursor:not-allowed;}
    .form-status{display:none;padding:16px 20px;border-radius:var(--r-sm);margin-top:1rem;font-weight:500;font-size:0.95rem;}
    .form-status.success{display:block;background:#ecf7ec;border:1px solid #4caf50;color:#2e7d32;}
    .form-status.error{display:block;background:#fdf0ee;border:1px solid var(--rust);color:var(--rust);}

    footer{background:rgba(26,18,8,0.99);border-top:1px solid rgba(196,154,42,0.25);color:rgba(250,246,239,0.4);margin-top:4rem;position:relative;z-index:1;}
    .footer-main{max-width:1160px;margin:0 auto;padding:3rem 5% 2rem;display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr;gap:2.5rem;}
    .footer-col h5{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:0.9rem;}
    .footer-col a{display:block;color:inherit;text-decoration:none;font-size:0.85rem;margin-bottom:0.5rem;transition:color 0.2s;}
    .footer-col a:hover{color:var(--gold-l);}
    .footer-col p{font-size:0.85rem;margin-bottom:0.5rem;color:inherit;}
    .footer-bottom{border-top:1px solid rgba(196,154,42,0.12);padding:1.5rem 5%;display:flex;justify-content:space-between;align-items:center;font-family:'DM Mono',monospace;font-size:0.75rem;flex-wrap:wrap;gap:10px;}
    
    @media(max-width:900px){.footer-main{grid-template-columns:1fr 1fr;}}
    @media(max-width:600px){
        .header-left nav{display:none;}
        .hamburger{display:flex;order:3;margin-left:10px;}
        .form-row{grid-template-columns:1fr;gap:0;}
        .anfrage-form{padding:2rem 1.5rem;}
        .footer-main{grid-template-columns:1fr;}
        .footer-bottom{flex-direction:column;text-align:center;}
    }
    </style>
</head>
<body>

{% include header.html %}

<main class="form-wrap">
    <div class="section-eyebrow">Unverbindlich anfragen</div>
    <h1 class="section-title">Event planen</h1>
    <p class="subtitle">Teilen Sie uns die ersten Details zu Ihrer Veranstaltung mit. Wir melden uns zeitnah bei Ihnen zurück.</p>

    <form class="anfrage-form" id="anfrageForm" novalidate>
        <div class="form-group">
            <label for="eventType">Art der Veranstaltung *</label>
            <select id="eventType" name="eventType" required>
                <option value="" disabled selected>Bitte wählen...</option>
                <option value="catering">Catering außer Haus (bis 60 Pers.)</option>
                <option value="bistro">Feier im Bistro (bis <span data-dynamic-text="sitzplaetze">20</span> Pers.)</option>
            </select>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="name">Vor- &amp; Nachname *</label>
                <input type="text" id="name" name="name" required placeholder="Max Mustermann">
            </div>
            <div class="form-group">
                <label for="email">E-Mail Adresse *</label>
                <input type="email" id="email" name="email" required placeholder="max@beispiel.de">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="date">Wunschdatum</label>
                <input type="date" id="date" name="date">
            </div>
            <div class="form-group">
                <label for="guests">Ungefähre Gästeanzahl</label>
                <input type="number" id="guests" name="guests" min="1" max="60" placeholder="z.B. 20">
            </div>
        </div>

        <div class="form-group">
            <label for="message">Weitere Details / Fragen</label>
            <textarea id="message" name="message" placeholder="Beschreiben Sie kurz Ihr Vorhaben (z.B. Firmenfeier, Geburtstag) und besondere Wünsche..."></textarea>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
            <span id="submitBtnText">Anfrage absenden</span>
        </button>
        <div class="form-status" id="formStatus"></div>
    </form>
</main>

{% include footer.html %}

<script>
// ══════════════════════════════════════════════════════════════
//  WEB APP URL & SETTINGS URL
// ══════════════════════════════════════════════════════════════
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzOq403kNYnhu0bsyS84B0H_-h_LopKyeJSXoXOs1WSqNCFjIpxVRa9zpV6gNKSUH8/exec";
const GOOGLE_SHEET_SETTINGS_URL = 'https://docs.google.com/spreadsheets/d/1fP97sZGxXjA-vDOV2wpWtw16W74EhP_urhCaFIspjaQ/export?format=csv&gid=931186417';

let maxBistroGuests = 20; // Standardwert, wird überschrieben

// ══════════════════════════════════════════════════════════════
//  HELPER FUNCTIONS
// ══════════════════════════════════════════════════════════════
function parseCSV(text) {
    const rows = [];
    let row = [];
    let inQuotes = false;
    let val = '';
    for (let i = 0; i < text.length; i++) {
        let c = text[i];
        let nc = text[i+1];
        if (c === '"' && inQuotes && nc === '"') { val += '"'; i++; }
        else if (c === '"') { inQuotes = !inQuotes; }
        else if (c === ',' && !inQuotes) { row.push(val); val = ''; }
        else if (c === '\n' && !inQuotes) { row.push(val); rows.push(row); row = []; val = ''; }
        else if (c === '\r' && !inQuotes) { /* ignore */ }
        else { val += c; }
    }
    row.push(val);
    rows.push(row);
    return rows;
}

function getDirectImageUrl(url) {
    if (!url) return "placeholder.png";
    const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
    if (match && match[1]) {
        return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w1000`;
    }
    return url;
}

// ══════════════════════════════════════════════════════════════
//  LOAD HEADER & FOOTER DATA
// ══════════════════════════════════════════════════════════════
async function loadSettingsFromCSV() {
    try {
        const response = await fetch(GOOGLE_SHEET_SETTINGS_URL);
        const csvText = await response.text();
        const parsedData = parseCSV(csvText);
        
        parsedData.forEach(row => {
            if (row.length >= 2 && row[0]) {
                const key = row[0].trim().toLowerCase();
                const value = row[1] ? row[1].trim() : "";

                if (key === 'sitzplaetze') {
                    const spElem = document.querySelector('[data-dynamic-text="sitzplaetze"]');
                    if (spElem) spElem.textContent = value;
                    maxBistroGuests = parseInt(value) || 20;
                    updateGuestLimits(); // Aktualisiert das Input-Feld
                } else if (key === 'telefon') {
                    const telSpan = document.getElementById('footer-telefon');
                    if(telSpan) telSpan.innerText = value;
                } else if (key === 'fax') {
                    const faxSpan = document.getElementById('footer-fax');
                    if(faxSpan) faxSpan.innerText = value;
                } else if (key === 'email') {
                    const emailSpan = document.getElementById('footer-email');
                    if(emailSpan) {
                        emailSpan.innerText = value;
                        emailSpan.href = 'mailto:' + value;
                    }
                } else if (key === 'logo_url') {
                    const logoEl = document.getElementById('header-logo');
                    if (logoEl && value) logoEl.src = getDirectImageUrl(value);
                } else if (key === 'facebook_url') {
                    const fbEl = document.getElementById('header-fb');
                    if (fbEl && value) fbEl.href = value;
                } else if (key === 'instagram_url') {
                    const igEl = document.getElementById('header-ig');
                    if (igEl && value) igEl.href = value;
                }
            }
        });
    } catch (error) {
        console.error("Fehler beim Laden der Einstellungen:", error);
    }
}

// ══════════════════════════════════════════════════════════════
//  FORM SUBMISSION → Google Apps Script
// ══════════════════════════════════════════════════════════════
async function submitForm(e) {
    e.preventDefault();

    if (!SCRIPT_URL || SCRIPT_URL === "HIER_DEINE_APPS_SCRIPT_URL_EINTRAGEN") {
        showStatus('error', '⚠ Konfigurationsfehler: Apps Script URL fehlt im Quellcode.');
        return;
    }

    const name  = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const type  = document.getElementById('eventType').value;

    if (!name || !email || !type) {
        showStatus('error', 'Bitte füllen Sie alle Pflichtfelder aus (Art der Veranstaltung, Name, E-Mail).');
        return;
    }

    const btn     = document.getElementById('submitBtn');
    const btnText = document.getElementById('submitBtnText');
    btn.disabled  = true;
    btnText.textContent = 'Wird gesendet …';

    const eventTypeLabel = type === 'catering'
        ? 'Catering außer Haus'
        : 'Feier im Bistro';

    const payload = {
        action        : 'eventRequest',
        targetSheetGid: '875868487', // GID des Tabs, wo die Anfrage gespeichert werden soll
        eventType     : eventTypeLabel,
        name          : name,
        email         : email,
        date          : document.getElementById('date').value || '–',
        guests        : document.getElementById('guests').value || '–',
        message       : document.getElementById('message').value.trim() || '–'
    };

    try {
        const res = await fetch(SCRIPT_URL, {
            method : 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body   : JSON.stringify(payload)
        });

        const text = await res.text();
        let result = {};
        try { result = JSON.parse(text); } catch(e) { result = { success: res.ok }; }

        if (result.success) {
            showStatus('success', '✓ Ihre Anfrage wurde erfolgreich gesendet! Wir melden uns zeitnah bei Ihnen.');
            document.getElementById('anfrageForm').reset();
        } else {
            showStatus('error', 'Fehler: ' + (result.error || 'Unbekannter Fehler. Bitte versuchen Sie es erneut.'));
        }
    } catch(err) {
        showStatus('error', 'Verbindungsfehler. Bitte versuchen Sie es später erneut.');
        console.error('Form submit error:', err);
    } finally {
        btn.disabled = false;
        btnText.textContent = 'Anfrage absenden';
    }
}

function showStatus(type, message) {
    const el = document.getElementById('formStatus');
    el.className  = 'form-status ' + type;
    el.textContent = message;
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ══════════════════════════════════════════════════════════════
//  DYNAMIC GUEST LIMITS
// ══════════════════════════════════════════════════════════════
const eventTypeSelect = document.getElementById('eventType');
const guestsInput = document.getElementById('guests');

function updateGuestLimits() {
    if (eventTypeSelect.value === 'bistro') {
        guestsInput.max = maxBistroGuests;
        guestsInput.placeholder = `z.B. 15 (max. ${maxBistroGuests})`;
        if (parseInt(guestsInput.value) > maxBistroGuests) guestsInput.value = maxBistroGuests;
    } else if (eventTypeSelect.value === 'catering') {
        guestsInput.max = 60;
        guestsInput.placeholder = "z.B. 40 (max. 60)";
        if (parseInt(guestsInput.value) > 60) guestsInput.value = 60;
    }
}

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
    // 1. Daten laden (Header/Footer & Sitzplätze)
    loadSettingsFromCSV();

    // 2. Mobile Nav
    const hambBtn = document.getElementById('hamburger');
    const drawer  = document.getElementById('mobileNav');
    if (hambBtn && drawer) {
        hambBtn.addEventListener('click', () => {
            hambBtn.classList.toggle('open');
            drawer.classList.toggle('open');
            document.body.style.overflow = drawer.classList.contains('open') ? 'hidden' : '';
        });
        drawer.querySelectorAll('a').forEach(a => {
            a.addEventListener('click', () => {
                hambBtn.classList.remove('open');
                drawer.classList.remove('open');
                document.body.style.overflow = '';
            });
        });
    }

    // 3. Date Limits
    const dateInput = document.getElementById('date');
    const today = new Date();
    
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    dateInput.min = `${yyyy}-${mm}-${dd}`; 

    const nextYearDate = new Date(today);
    nextYearDate.setFullYear(yyyy + 1);
    const nextYyyy = nextYearDate.getFullYear();
    const nextMm = String(nextYearDate.getMonth() + 1).padStart(2, '0');
    const nextDd = String(nextYearDate.getDate()).padStart(2, '0');
    dateInput.max = `${nextYyyy}-${nextMm}-${nextDd}`; 

    dateInput.addEventListener('change', function() {
        if (!this.value) return; 
        
        const selectedDate = new Date(this.value);
        const minDate = new Date(this.min);
        const maxDate = new Date(this.max);

        selectedDate.setHours(0, 0, 0, 0);
        minDate.setHours(0, 0, 0, 0);
        maxDate.setHours(0, 0, 0, 0);

        if (selectedDate < minDate) {
            this.value = this.min; 
        } else if (selectedDate > maxDate) {
            this.value = this.max; 
        }
    });

    // 4. Guest Input block
    eventTypeSelect.addEventListener('change', updateGuestLimits);

    guestsInput.addEventListener('input', function() {
        const currentMax = parseInt(this.max) || 60; 
        if (this.value !== "") {
            const val = parseInt(this.value);
            if (val > currentMax) {
                this.value = currentMax;
            } else if (val < 1) {
                this.value = 1; 
            }
        }
    });

    const t = new URLSearchParams(window.location.search).get('type');
    if (t === 'catering' || t === 'bistro') {
        eventTypeSelect.value = t;
    }
    
    updateGuestLimits();
    document.getElementById('anfrageForm').addEventListener('submit', submitForm);
});
</script>
</body>
</html>
