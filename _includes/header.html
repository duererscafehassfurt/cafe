<style>
header { position: sticky; top: 0; z-index: 200; background: var(--ink); height: 66px; display: flex; align-items: center; padding: 0 5%; border-bottom: 2px solid var(--gold); justify-content: space-between; }
.header-left { display: flex; align-items: center; gap: 20px; flex: 1; }
.header-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
.school-logo { height: 40px; width: 40px; object-fit: contain; background: white; border-radius: 4px; padding: 2px; }
.logo { font-family: 'Playfair Display', serif; font-size: 1.65rem; font-weight: 900; color: var(--cream); text-decoration: none; flex-shrink: 0; }
nav { display: flex; align-items: center; margin-left: 10px; overflow-x: auto; scrollbar-width: none; }
nav::-webkit-scrollbar { display: none; }
nav a { display: flex; align-items: center; height: 66px; padding: 0 14px; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.09em; text-transform: uppercase; color: rgba(250,246,239,0.65); text-decoration: none; border-bottom: 3px solid transparent; white-space: nowrap; transition: color 0.2s, border-color 0.2s; }
nav a:hover, nav a.active { color: var(--gold-l); border-bottom-color: var(--gold); }
.header-right { display: flex; align-items: center; gap: 15px; }
.social-icon { color: rgba(250,246,239,0.65); display: flex; align-items: center; transition: color 0.2s, transform 0.2s; }
.social-icon:hover { color: var(--gold-l); transform: translateY(-2px); }
.hamburger { display: none; flex-direction: column; justify-content: center; gap: 5px; cursor: pointer; padding: 8px; background: none; border: none; z-index: 300; }
.hamburger span { display: block; width: 24px; height: 2px; background: var(--cream); border-radius: 2px; transition: transform 0.3s, opacity 0.3s; }
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
.mobile-nav { display: none; position: fixed; top: 66px; left: 0; right: 0; bottom: 0; background: var(--ink); z-index: 199; flex-direction: column; padding: 1.5rem 6%; overflow-y: auto; }
.mobile-nav.open { display: flex; }
.mobile-nav a { font-size: 1.2rem; font-weight: 500; color: rgba(250,246,239,0.75); text-decoration: none; padding: 1rem 0; border-bottom: 1px solid rgba(196,154,42,0.15); transition: color 0.2s; }
.mobile-nav a:last-child { border-bottom: none; }
.mobile-nav a:hover, .mobile-nav a.active { color: var(--gold-l); }
@media (max-width: 600px) { .hamburger { display: flex; } .header-left nav { display: none; } }
</style>
