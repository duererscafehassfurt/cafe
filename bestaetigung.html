<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservierung Bestätigen · DÜRERs</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
    :root {
        --ink: #1a1208; --ink-60: rgba(26,18,8,0.6); --ink-40: rgba(26,18,8,0.4); --ink-15: rgba(26,18,8,0.15);
        --cream: #faf6ef; --parch: #f0e8d8; --parch-d: #e4d8c4;
        --rust: #8b3a2a; --rust-l: #b84e38; --gold: #c49a2a; --gold-l: #e8c060; --sage: #4a5c46;
        --ok: #3a9e6a; --err: #c0392b;
        --shadow-sm: 0 2px 8px rgba(26,18,8,0.10); --shadow-md: 0 4px 24px rgba(26,18,8,0.14);
        --r-sm: 6px; --r: 12px; font-size: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; font-weight: 300; background: var(--cream); color: var(--ink); line-height: 1.7; display: flex; flex-direction: column; min-height: 100vh;}
    
    body::before {
        content: ''; position: fixed; inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
        pointer-events: none; z-index: -1; opacity: 0.5;
    }

    header { position: sticky; top: 0; z-index: 200; background: var(--ink); height: 66px; display: flex; align-items: center; padding: 0 5%; border-bottom: 2px solid var(--gold); justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: 20px; flex: 1; }
    .header-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .school-logo { height: 40px; width: 40px; object-fit: contain; background: white; border-radius: 4px; padding: 2px; }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.65rem; font-weight: 900; color: var(--cream); text-decoration: none; flex-shrink: 0; }
    .logo span { color: var(--gold); }
    nav { display: flex; align-items: center; margin-left: 10px; overflow-x: auto; scrollbar-width: none; }
    nav::-webkit-scrollbar { display: none; }
    nav a { display: flex; align-items: center; height: 66px; padding: 0 14px; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.09em; text-transform: uppercase; color: rgba(250,246,239,0.65); text-decoration: none; border-bottom: 3px solid transparent; white-space: nowrap; transition: color 0.2s, border-color 0.2s; }
    nav a:hover { color: var(--gold-l); border-bottom-color: var(--gold); }

    .header-right { display: flex; align-items: center; gap: 15px; }
    .social-icon { color: rgba(250,246,239,0.65); display: flex; align-items: center; transition: color 0.2s, transform 0.2s; }
    .social-icon:hover { color: var(--gold-l); transform: translateY(-2px); }

    .hamburger { display: none; flex-direction: column; justify-content: center; gap: 6px; cursor: pointer; padding: 5px; background: none; border: none; z-index: 300; margin-right: 5px; }
    .hamburger span { display: block; width: 24px; height: 2px; background: var(--cream); border-radius: 2px; transition: transform 0.3s, opacity 0.3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

    .mobile-nav { display: none; position: fixed; top: 66px; left: 0; right: 0; bottom: 0; background: var(--ink); z-index: 199; flex-direction: column; align-items: center; padding-top: 4rem; overflow-y: auto; }
    .mobile-nav.open { display: flex; }
    .mobile-nav a { position: relative; font-size: 1.05rem; font-weight: 400; color: rgba(250,246,239,0.75); text-decoration: none; padding: 1.5rem 0; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.2s; text-align: center; width: 100%; max-width: 250px; }
    .mobile-nav a:not(:last-child)::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 140px; height: 1px; background: rgba(196,154,42,0.25); }
    .mobile-nav a:hover, .mobile-nav a.active { color: var(--gold); }

    .page-wrap { max-width: 600px; margin: 4rem auto; padding: 0 5%; flex: 1; display: flex; align-items: center; justify-content: center; width: 100%;}
    
    .status-card { background: white; border-radius: var(--r); padding: 3rem 2rem; box-shadow: var(--shadow-md); border-top: 4px solid var(--rust); text-align: center; width: 100%; position: relative;}
    
    .status-icon { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 1.5rem; }
    .icon-loading { background: var(--parch); color: var(--gold); animation: pulse 1.5s infinite; }
    .icon-success { background: var(--ok); color: white; }
    .icon-error { background: var(--err); color: white; }

    @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.8; } }

    .status-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--ink); margin-bottom: 0.5rem; line-height: 1.2;}
    .status-msg { font-size: 0.95rem; color: var(--ink-60); margin-bottom: 1.5rem; }

    .confirm-box { background: var(--parch); border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem; text-align: left; font-size: 0.9rem; }
    .confirm-box table { width: 100%; border-collapse: collapse; }
    .confirm-box td { padding: 6px 0; border-bottom: 1px solid rgba(26,18,8,0.05); }
    .confirm-box tr:last-child td { border-bottom: none; }
    .confirm-box td:first-child { color: var(--ink-60); width: 35%; font-weight: 500; }
    .confirm-box td:last-child { font-weight: 600; color: var(--ink); }

    .btn { display: inline-block; padding: 12px 24px; border-radius: var(--r-sm); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; border: none; transition: all 0.18s; text-align: center; text-decoration: none; }
    .btn-primary { background: var(--rust); color: white; box-shadow: 0 4px 14px rgba(139,58,42,0.3); }
    .btn-primary:hover { background: var(--rust-l); }

    footer { background: rgba(26,18,8,0.99); border-top: 1px solid rgba(196,154,42,0.25); color: rgba(250,246,239,0.4); margin-top: auto;}
    .footer-main { max-width: 1160px; margin: 0 auto; padding: 3rem 5% 2rem; display: grid; grid-template-columns: 1.3fr 1fr 1fr 1fr; gap: 2.5rem; }
    .footer-col h5 { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.9rem; }
    .footer-col a { display: block; color: inherit; text-decoration: none; font-size: 0.85rem; margin-bottom: 0.5rem; transition: color 0.2s; }
    .footer-col a:hover { color: var(--gold-l); }
    .footer-col p { font-size: 0.85rem; margin-bottom: 0.5rem; color: inherit; }
    .footer-bottom { border-top: 1px solid rgba(196,154,42,0.12); padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center; font-family: 'DM Mono', monospace; font-size: 0.75rem; flex-wrap: wrap; gap: 10px; }

    @media (max-width: 900px) { .footer-main { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 600px) { .header-left nav { display: none; } .hamburger { display: flex; order: 3; margin-right: 0; margin-left: 10px; } .footer-main { grid-template-columns: 1fr; } .footer-bottom { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>

{% include header.html %}

<div class="page-wrap">
    <div class="status-card" id="statusCard">
        <div class="status-icon icon-loading" id="icon">⏳</div>
        <h1 class="status-title" id="title">Reservierung wird bestätigt...</h1>
        <p class="status-msg" id="message">Bitte warten Sie einen Moment. Wir gleichen Ihre Daten mit unserem System ab.</p>
        
        <div class="confirm-box" id="summaryBox" style="display: none;">
            <table>
                <tr><td>Name</td><td id="c-name"></td></tr>
                <tr><td>Datum</td><td id="c-date"></td></tr>
                <tr><td>Zeitfenster</td><td id="c-zeitfenster"></td></tr>
                <tr><td>Verzehrort</td><td id="c-type"></td></tr>
                <tr><td>Auswahl</td><td id="c-items"></td></tr>
                <tr><td>Betrag</td><td id="c-price" style="color: var(--rust); font-family: 'DM Mono', monospace; font-size: 1.1rem;"></td></tr>
            </table>
        </div>

        <a href="menu-reservierung.html" class="btn btn-primary" id="homeBtn" style="display: none;">Zurück zum Menü</a>
    </div>
</div>

{% include footer.html %}

<script>
// Google Apps Script URL
const GAS_URL = "https://script.google.com/macros/s/AKfycbzOq403kNYnhu0bsyS84B0H_-h_LopKyeJSXoXOs1WSqNCFjIpxVRa9zpV6gNKSUH8/exec";

async function confirmOrder() {
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('orderId') || urlParams.get('confirm');

    const uiIcon = document.getElementById('icon');
    const uiTitle = document.getElementById('title');
    const uiMessage = document.getElementById('message');
    const homeBtn = document.getElementById('homeBtn');
    const summaryBox = document.getElementById('summaryBox');

    if (!orderId) {
        showError("Ungültiger Link", "Es wurde keine Bestellnummer gefunden. Bitte nutzen Sie den Link aus Ihrer E-Mail.");
        return;
    }

    try {
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'confirm', token: orderId })
        });
        
        const result = await response.json();

        if (!result.success) {
            showError("Fehler bei der Bestätigung", result.message || "Ihre Bestellung konnte nicht bestätigt werden. Möglicherweise ist die Frist abgelaufen oder die Bestellung wurde bereits bestätigt.");
            return;
        }

        // --- SUCCESS UI UPDATE ---
        uiIcon.className = "status-icon icon-success";
        uiIcon.innerHTML = "✓";
        uiTitle.innerText = "Reservierung Erfolgreich!";
        uiTitle.style.color = "var(--ok)";
        uiMessage.innerHTML = `Vielen Dank! Ihre Reservierung <strong>#${orderId}</strong> ist nun verbindlich gebucht.<br>Wir haben Ihnen eine finale Bestätigungs-E-Mail gesendet.`;
        
        // Populate the summary table with data returned from Google Sheets
        if (result.data) {
            document.getElementById('c-name').textContent = result.data.name;
            document.getElementById('c-date').textContent = result.data.date;
            document.getElementById('c-zeitfenster').textContent = result.data.slot;
            document.getElementById('c-type').textContent = result.data.type;
            document.getElementById('c-items').textContent = result.data.items || "Keine Speisen";
            document.getElementById('c-price').textContent = result.data.price;
            summaryBox.style.display = "block";
        }

        homeBtn.style.display = "inline-block";

    } catch (error) {
        console.error(error);
        showError("Verbindungsfehler", "Es gab ein Problem bei der Kommunikation mit dem Server. Bitte versuchen Sie es später erneut.");
    }
}

function showError(title, message) {
    const uiIcon = document.getElementById('icon');
    const uiTitle = document.getElementById('title');
    const uiMessage = document.getElementById('message');
    const homeBtn = document.getElementById('homeBtn');
    const summaryBox = document.getElementById('summaryBox');

    uiIcon.className = "status-icon icon-error";
    uiIcon.innerHTML = "✕";
    uiTitle.innerText = title;
    uiTitle.style.color = "var(--err)";
    uiMessage.innerHTML = message;
    summaryBox.style.display = "none";
    homeBtn.style.display = "inline-block";
}

document.addEventListener('DOMContentLoaded', confirmOrder);
</script>
</body>
</html>
